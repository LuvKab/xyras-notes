{{ define "main" }}
<p class="site-label"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></p>
<h1 class="post-title">{{ .Title }}</h1>
<p class="post-meta">
  <time datetime='{{ .Date.Format "2006-01-02" }}'>
    {{ .Date.Format (default "2006-01-02" .Site.Params.dateFormat) }}
  </time>
</p>

<content class="post-body">
  {{ .Content }}
</content>
{{ end }}
