<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,800;1,800&display=swap");

  :root {
    --width: 980px;
    --font-main: "Inter", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
    --font-secondary: "Inter", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
    --heading-color: #111;
    --text-color: #222;
    --link-color: #111;
    --visited-color: #111;
    --background-color: #f3f3f3;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --heading-color: #111;
      --text-color: #222;
      --link-color: #111;
      --visited-color: #111;
      --background-color: #f3f3f3;
    }
  }

  body {
    display: grid;
    grid-template-columns: 122px minmax(0, 1fr);
    grid-template-areas:
      "header main"
      ". footer";
    column-gap: 58px;
    row-gap: 18px;
    max-width: var(--width);
    padding: 56px 24px 30px;
    font-size: 1rem;
    line-height: 1.68;
    font-family: var(--font-secondary);
    background-color: var(--background-color);
    color: var(--text-color);
  }

  header {
    grid-area: header;
    align-self: start;
    position: sticky;
    top: 36px;
  }

  main {
    grid-area: main;
    max-width: 690px;
  }

  footer {
    grid-area: footer;
    max-width: 690px;
    margin-top: 6px;
    padding: 8px 0 4px;
    border-top: 1px solid #ddd;
    text-align: center;
    font-size: 0.8rem;
    color: #666;
    line-height: 1.6;
  }

  footer p {
    margin: 0;
  }

  .side-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .side-nav a {
    margin-right: 0;
    font-size: 1rem;
    color: #111;
  }

  .side-nav a:hover {
    text-decoration: underline;
  }

  h1 {
    margin-top: 0;
    margin-bottom: 12px;
    font-size: 2.02rem;
    font-weight: 800;
  }

  p {
    margin: 0 0 14px;
  }

  hr {
    margin: 20px 0 14px;
    border-top: 1px solid #ddd;
  }

  main a {
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-thickness: 2px;
  }

  ul.home-posts {
    list-style: none;
    margin: 0 0 14px;
    padding: 0;
  }

  ul.home-posts li {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 6px;
  }

  ul.home-posts time {
    width: 94px;
    flex: 0 0 94px;
    font-size: 0.92rem;
    color: #333;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
  }

  ul.home-posts a {
    color: #111;
    text-decoration: underline;
  }

  .link-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .link-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .link-list img {
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
  }

  .link-list a {
    color: #111;
    text-decoration: underline;
  }

  .site-label {
    margin: 0 0 18px;
    font-weight: 800;
    font-size: 2rem;
    line-height: 1.15;
  }

  .site-label a {
    color: #111;
    text-decoration: none;
  }

  .post-title {
    margin: 0 0 16px;
    font-size: 3.7rem;
    line-height: 1.08;
    font-weight: 800;
    font-style: italic;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .post-meta {
    margin-bottom: 10px;
  }

  .post-meta time {
    font-size: 1.16rem;
    font-weight: 800;
    font-style: normal;
  }

  .post-body p {
    margin-bottom: 16px;
    line-height: 1.92;
  }

  .post-body h2,
  .post-body h3 {
    margin-top: 26px;
    margin-bottom: 10px;
    font-size: 2rem;
    line-height: 1.2;
    font-weight: 800;
  }

  .post-body img {
    display: block;
    max-width: 100%;
    margin: 14px 0 20px;
  }

  @media (max-width: 900px) {
    body {
      display: block;
      max-width: 740px;
      padding: 24px 16px 20px;
      font-size: 0.98rem;
    }

    header {
      position: static;
      margin-bottom: 16px;
    }

    .side-nav {
      flex-direction: row;
      gap: 14px;
      flex-wrap: wrap;
    }

    .site-label {
      font-size: 1.65rem;
      margin-bottom: 12px;
    }

    .post-title {
      font-size: 2.2rem;
      line-height: 1.12;
    }

    main,
    footer {
      max-width: 100%;
    }
  }
</style>
